<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Vehicles - SM-Autos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>

    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="container">
        <div class="row g-3 align-items-end">
          <div class="col-lg-4 col-md-6">
            <label class="form-label fw-semibold text-muted-brand small mb-1">Search Keyword</label>
            <input type="text" class="form-control" id="keyword-input" placeholder="Car Make or Model" />
          </div>
          <div class="col-lg-3 col-md-6">
            <label class="form-label fw-semibold text-muted-brand small mb-1">City</label>
            <select class="form-select" id="city-filter">
              <!-- Rendered by data.js -->
            </select>
          </div>
          <div class="col-lg-3 col-md-6">
            <label class="form-label fw-semibold text-muted-brand small mb-1">Price Range</label>
            <select class="form-select" id="price-filter">
              <!-- Rendered by data.js -->
            </select>
          </div>
          <div class="col-lg-2 col-md-6">
            <button class="btn btn-primary-brand w-100 py-2" id="search-btn">
              <i class="fas fa-search me-1"></i> Search
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- SEARCH RESULTS -->
    <main class="py-5 bg-light-brand">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
          <h2 class="section-title mb-0" id="search-heading">Search Results</h2>
          <div id="results-info" class="text-muted-brand small"></div>
        </div>
        <div id="search-results" class="row g-4">
          <!-- Rendered by search.js -->
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <!-- FLOATING WHATSAPP -->
    <div id="floating-whatsapp"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="search.js"></script>
  </body>
</html>
