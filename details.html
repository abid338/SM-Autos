<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Details - SM-Autos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>

    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <!-- BREADCRUMB -->
    <div class="breadcrumb-bar">
      <div class="container">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="search.html">Search</a></li>
            <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-title">Vehicle Details</li>
          </ol>
        </nav>
      </div>
    </div>

    <!-- VEHICLE DETAILS -->
    <main class="py-5 bg-light-brand">
      <div class="container">
        <div id="vehicle-details">
          <!-- Loading State -->
          <div class="text-center py-5">
            <div class="spinner-border spinner-border text-brand" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted-brand">Loading vehicle details...</p>
          </div>
        </div>
      </div>
    </main>

    <!-- RELATED VEHICLES -->
    <section class="py-5">
      <div class="container">
        <h3 class="section-title">Related Vehicles</h3>
        <div id="related-vehicles" class="row g-4">
          <!-- Loaded by details.js -->
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <!-- FLOATING WHATSAPP -->
    <div id="floating-whatsapp"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="details.js"></script>
  </body>
</html>
