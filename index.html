<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SM-Autos - Pakistan's #1 platform for buying and selling vehicles." />
    <meta name="keywords" content="Pakistan cars, bikes, vehicles, buy sell, SM-Autos" />
    <title>SM-Autos - Buy &amp; Sell Vehicles</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>

    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <!-- HERO SECTION -->
    <section class="hero-section text-white text-center py-5" aria-label="Search vehicles">
      <div class="container py-4">
        <h1 class="fw-bold mb-3">Find Used Cars in Pakistan</h1>
        <p class="lead mb-5">With thousands of vehicles, we have just the right one for you</p>

        <div class="row justify-content-center">
          <div class="col-lg-9 col-xl-8">
            <div class="hero-search-card card">
              <div class="card-body p-0">
                <form role="search" onsubmit="return false;">
                  <div class="row g-0">
                    <div class="col-lg-4">
                      <label for="hero-keyword" class="visually-hidden">Car Make or Model</label>
                      <input
                        type="text"
                        class="form-control form-control-lg"
                        id="hero-keyword"
                        placeholder="Car Make or Model"
                        aria-label="Search by car make or model"
                      />
                    </div>
                    <div class="col-lg-3">
                      <label for="city-select" class="visually-hidden">Select City</label>
                      <select class="form-select form-select-lg" id="city-select" aria-label="Select city">
                        <!-- Rendered by data.js -->
                      </select>
                    </div>
                    <div class="col-lg-3">
                      <label for="price-select" class="visually-hidden">Select Price Range</label>
                      <select class="form-select form-select-lg" id="price-select" aria-label="Select price range">
                        <!-- Rendered by data.js -->
                      </select>
                    </div>
                    <div class="col-lg-2">
                      <button
                        type="button"
                        class="btn search-btn w-100 h-100 fw-bold fs-5"
                        aria-label="Search vehicles"
                      >
                        <i class="fas fa-search" aria-hidden="true"></i>
                      </button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- VEHICLES SECTIONS -->
    <main class="py-5 bg-light-brand">
      <div class="container" id="vehicles-container">
        <!-- Rendered by script.js -->
      </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <!-- FLOATING WHATSAPP -->
    <div id="floating-whatsapp"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
